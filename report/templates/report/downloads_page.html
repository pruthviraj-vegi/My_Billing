{% extends "base.html" %}
{% load static %}
{% block title %}Downloads{% endblock title %}

{% block content %}
<div class="page-header">
  <h2 class="page-title"><i class="fas fa-download"></i> Downloads</h2>
  <div class="page-actions">
      <button class="btn btn-outline-secondary" onclick="reloadTable('downloads_table')">
          <i class="fas fa-sync-alt"></i> Refresh
      </button>
  </div>
</div>

<nav class="breadcrumb breadcrumb-right">
  <a href="{% url 'base:home' %}" class="breadcrumb-item">Dashboard</a>
  <span class="breadcrumb-separator">/</span>
  <span class="breadcrumb-active">Downloads</span>
</nav>

<div class="col">
  <div class="table-section" id="downloadsSection">
    <div class="table-header">
      <h3>Generated Files</h3>
    </div>
    <div class="table-container">
      <table class="data-table" id="downloads_table" data-sort="-created_at">
        <thead>
          <tr>
            <th>Job Type</th>
            <th>Requested At</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="4" class="text-center p-4">
              <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                Loading downloads...
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock content %}

{% block extra_js %}
<script src="{% static 'js/fetchData.js' %}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    initTableAjax(null, 'downloads_table', '{% url "report:downloads_fetch" %}', {
      method: 'GET',
      loadingText: 'Loading downloads...',
      autoLoad: true,
      sortable: false
    }, false);
    var pollTimer = null;
    function hasPendingJobs() {
      var table = document.getElementById('downloads_table');
      if (!table) return false;
      return table.querySelector('.status-pending, .status-processing') !== null;
    }
    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(function() {
        reloadTable('downloads_table');
        setTimeout(function() {
          if (!hasPendingJobs() && pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
        }, 1500);
      }, 10000);
    }
    var observer = new MutationObserver(function() {
      if (hasPendingJobs()) {
        startPolling();
      }
    });
    var tbody = document.querySelector('#downloads_table tbody');
    if (tbody) {
      observer.observe(tbody, { childList: true, subtree: true });
    }
  });
</script>
{% endblock extra_js %}
